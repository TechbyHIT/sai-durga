# PM2 + standalone Node — port 3002
# Install:
#   sudo cp nginx-pm2.conf /etc/nginx/sites-available/saidurgainvisiblegrills.in
#   sudo ln -sf /etc/nginx/sites-available/saidurgainvisiblegrills.in /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d saidurgainvisiblegrills.in

upstream sai_durga_app {
    server 127.0.0.1:3002;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name saidurgainvisiblegrills.in;

    location / {
        proxy_pass http://sai_durga_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name saidurgainvisiblegrills.in;

    ssl_certificate /etc/letsencrypt/live/saidurgainvisiblegrills.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saidurgainvisiblegrills.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://sai_durga_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
