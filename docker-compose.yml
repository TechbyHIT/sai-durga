services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sai-durga-app
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SITE_URL: https://saidurgainvisiblegrills.in
