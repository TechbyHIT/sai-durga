# Production Nginx — saidurgainvisiblegrills.in
# Upstream: Docker app on host port 8080

upstream sai_durga_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Rate limit zones
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=assets:10m rate=60r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name saidurgainvisiblegrills.in www.saidurgainvisiblegrills.in;
    return 301 https://saidurgainvisiblegrills.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name saidurgainvisiblegrills.in www.saidurgainvisiblegrills.in;

    # ssl_certificate     /etc/letsencrypt/live/saidurgainvisiblegrills.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/saidurgainvisiblegrills.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 2m;
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 65s;
    send_timeout 30s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    location /_next/static/ {
        limit_req zone=assets burst=80 nodelay;
        limit_conn conn 20;
        proxy_pass http://sai_durga_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* ^/(images|brand)/ {
        limit_req zone=assets burst=80 nodelay;
        proxy_pass http://sai_durga_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=general burst=40 nodelay;
        limit_conn conn 30;
        proxy_pass http://sai_durga_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
